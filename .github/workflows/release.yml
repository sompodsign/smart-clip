name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (macOS)
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install frontend dependencies
        working-directory: clipvault
        run: npm install

      - name: Build and release Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          projectPath: 'clipvault'
          tagName: ${{ github.ref_name }}
          releaseName: 'SmartClip ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload DMGs to GCS
        run: |
          DMG=$(find clipvault/src-tauri/target -name '*.dmg' | head -1)
          if [ -n "$DMG" ]; then
            ARCH=$(echo "$DMG" | grep -o 'aarch64\|x64' | head -1)
            # Upload versioned DMG
            gcloud storage cp "$DMG" gs://capaccino/
            # Upload with fixed "latest" name
            cp "$DMG" "SmartClip_latest_${ARCH}.dmg"
            gcloud storage cp "SmartClip_latest_${ARCH}.dmg" gs://capaccino/
          fi

      - name: Upload latest.json to GCS
        run: |
          if [ -f clipvault/src-tauri/target/release/bundle/macos/latest.json ]; then
            gcloud storage cp clipvault/src-tauri/target/release/bundle/macos/latest.json gs://capaccino/latest.json
          fi

      - name: Update Homebrew cask
        if: contains(matrix.args, 'aarch64')
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          DMG=$(find clipvault/src-tauri/target -name '*.dmg' | head -1)
          if [ -z "$DMG" ]; then exit 0; fi
          VERSION=$(grep '"version"' clipvault/src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9]*\.[0-9]*\.[0-9]*\)".*/\1/')
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          git clone https://x-access-token:${GH_TOKEN}@github.com/sompodsign/homebrew-tap.git /tmp/tap
          cd /tmp/tap
          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/smartclip.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/smartclip.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A && git commit -m "bump smartclip to ${VERSION}" && git push
