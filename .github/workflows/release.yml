name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: macos-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            gcs_arch: aarch64
            swift_target: arm64-apple-macosx
          - arch: x86_64
            gcs_arch: x64
            swift_target: x86_64-apple-macosx

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve Swift package dependencies
        run: swift package resolve

      - name: Build release binary
        run: swift build -c release --arch ${{ matrix.arch }}

      - name: Bundle .app
        run: |
          APP="SmartClip.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources" "$APP/Contents/Frameworks"

          # Copy binary
          cp .build/${{ matrix.swift_target }}/release/SmartClip "$APP/Contents/MacOS/SmartClip"

          # Copy Info.plist
          cp SmartClip/Info.plist "$APP/Contents/Info.plist"

          # Copy Sparkle framework (SPM artifact — universal binary)
          SPARKLE_FW=$(find .build/artifacts -name "Sparkle.framework" -maxdepth 8 | head -1)
          if [ -n "$SPARKLE_FW" ]; then
            cp -R "$SPARKLE_FW" "$APP/Contents/Frameworks/"
            install_name_tool -add_rpath @executable_path/../Frameworks "$APP/Contents/MacOS/SmartClip"
          fi

          # Copy resource bundles if present
          BUNDLE=$(find .build/${{ matrix.swift_target }}/release -name "*.bundle" | head -1)
          if [ -n "$BUNDLE" ]; then
            cp -R "$BUNDLE" "$APP/Contents/Resources/"
          fi

          # Set version from tag
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$APP/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$APP/Contents/Info.plist"

      - name: Create DMG
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          DMG_NAME="SmartClip_${VERSION}_${{ matrix.gcs_arch }}.dmg"
          hdiutil create -volname "SmartClip" -srcfolder SmartClip.app \
            -ov -format UDZO "$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Create GitHub Release and upload DMG
        uses: softprops/action-gh-release@v2
        with:
          name: SmartClip ${{ github.ref_name }}
          body: See the assets below to download and install this version.
          draft: true
          prerelease: false
          files: ${{ env.DMG_NAME }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload DMG to GCS
        run: |
          # Upload versioned DMG
          gcloud storage cp "${{ env.DMG_NAME }}" gs://capaccino/

          # Upload with fixed "latest" name (no-cache so CDN/browsers always fetch fresh)
          cp "${{ env.DMG_NAME }}" "SmartClip_latest_${{ matrix.gcs_arch }}.dmg"
          gcloud storage cp \
            --cache-control="no-cache, max-age=0" \
            "SmartClip_latest_${{ matrix.gcs_arch }}.dmg" gs://capaccino/

      - name: Verify GCS upload
        run: |
          echo "=== Verifying versioned DMG ==="
          gcloud storage ls -l "gs://capaccino/${{ env.DMG_NAME }}"
          echo "=== Verifying latest DMG ==="
          gcloud storage ls -l "gs://capaccino/SmartClip_latest_${{ matrix.gcs_arch }}.dmg"

      - name: Update Homebrew cask
        if: matrix.arch == 'arm64'
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          SHA=$(shasum -a 256 "${{ env.DMG_NAME }}" | awk '{print $1}')
          git config --global --unset-all http.https://github.com/.extraheader || true
          git clone https://x-access-token:${GH_TOKEN}@github.com/sompodsign/homebrew-tap.git /tmp/tap
          cd /tmp/tap
          sed -i '' "s/version \".*\"/version \"${{ env.VERSION }}\"/" Casks/smartclip.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/smartclip.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A && git commit -m "bump smartclip to ${{ env.VERSION }}" && git push
